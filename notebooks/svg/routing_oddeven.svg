<circle cx="716" cy="222" r="3.5" fill="#5BD982"/>
<text x="728" y="227" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" letter-spacing="2">● TURN RESTRICTIONS</text>
<text x="716" y="256" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">EVEN COLUMNS (my_x[0]==0)</text>
<text x="716" y="274" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#65D7E5">→ ALL TURNS ALLOWED</tspan></text>
<text x="716" y="296" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">  N↔E, N↔W, S↔E, S↔W</tspan></text>
<text x="716" y="324" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">ODD COLUMNS (my_x[0]==1)</text>
<text x="716" y="342" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#F076B0">→ E↔N, E↔S turns FORBIDDEN</tspan></text>
<text x="716" y="364" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">  Must finish vertical motion</tspan></text>
<text x="716" y="386" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">  before turning horizontally</tspan></text>
<text x="716" y="414" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">WHY IT WORKS</text>
<text x="716" y="432" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">Forbidden turns kill the cycles</tspan></text>
<text x="716" y="454" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">in the channel-dependency graph</tspan></text>
<text x="716" y="476" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">→ deadlock-free without VCs</tspan></text><rect x="60" y="640" width="600" height="140" rx="6" fill="#11161D" stroke="#3B4654" stroke-width="1"/>
        <text x="74" y="660" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1">// odd-even (mesh; uses ineq compares)</text>
        <text x="74" y="685" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">if (my_x[0] == 0) begin  // even col — turns OK</text>
        <text x="74" y="703" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">  if (dst_x != my_x) horizontal_first;</text>
        <text x="74" y="721" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">  else                vertical;</text>
        <text x="74" y="739" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">end else begin           // odd col — restrict</text>
        <text x="74" y="757" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">  if (dst_x == my_x) vertical; else horizontal;</text></svg>