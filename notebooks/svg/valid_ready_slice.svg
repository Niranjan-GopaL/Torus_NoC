<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820">
    <defs><pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#1F2933"/>
  </pattern></defs>
  <rect width="1600" height="820" fill="#0A0E13"/>
  <rect width="1600" height="820" fill="url(#dots)" opacity="0.5"/>
    <text x="60" y="40" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">// SKID BUFFER · DEPTH 1 · READY-VALID HANDSHAKE</text>
    <text x="60" y="100" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="52" font-weight="700">valid_ready_slice</text>
    <text x="60" y="140" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="15">A 1-deep registered buffer. Output is the registered value, never combinational from input.</text>
    <text x="60" y="162" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="15">Used on output ports of every router for timing isolation across hops.</text>

    <rect x="60" y="220" width="920" height="480" rx="6" fill="none" stroke="#3B4654" stroke-width="1"/>
    <text x="74" y="242" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2">// DATAPATH</text>

    <!-- inputs -->
    <line x1="110" y1="320" x2="462" y2="320" stroke="#F5B14B" stroke-width="2.2"/>
    <polygon points="462,315 470,320 462,325" fill="#F5B14B"/>
    <text x="110" y="311" fill="#F5B14B" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" text-anchor="start">data_in [7:0]</text>
    <line x1="110" y1="380" x2="462" y2="380" stroke="#5BD982" stroke-width="2.2"/>
    <polygon points="462,375 470,380 462,385" fill="#5BD982"/>
    <text x="110" y="371" fill="#5BD982" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" text-anchor="start">valid_in</text>
    <line x1="118" y1="440" x2="470" y2="440" stroke="#5BBAF0" stroke-width="2.2"/>
    <polygon points="118,435 110,440 118,445" fill="#5BBAF0"/>
    <text x="470" y="431" fill="#5BBAF0" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" text-anchor="end">ready_out = !data_valid</text>

    <!-- the register -->
    <rect x="470" y="290" width="220" height="200" rx="8" fill="#1B2230" stroke="#3B4654" stroke-width="1.5"/>
    <text x="580" y="320" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" text-anchor="middle">DATA_REG [7:0]</text>
    <rect x="510" y="345" width="140" height="60" rx="4" fill="#0A0E13" stroke="#F5B14B" stroke-width="1.5"/>
    <text x="580" y="382" fill="#F5B14B" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700" text-anchor="middle">B0</text>
    <text x="580" y="450" fill="#5BD982" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" text-anchor="middle">data_valid = 1</text>

    <!-- outputs -->
    <line x1="690" y1="320" x2="962" y2="320" stroke="#F5B14B" stroke-width="2.2"/>
    <polygon points="962,315 970,320 962,325" fill="#F5B14B"/>
    <text x="964" y="311" fill="#F5B14B" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" text-anchor="end">data_out [7:0]</text>
    <line x1="690" y1="380" x2="962" y2="380" stroke="#5BD982" stroke-width="2.2"/>
    <polygon points="962,375 970,380 962,385" fill="#5BD982"/>
    <text x="964" y="371" fill="#5BD982" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" text-anchor="end">valid_out</text>
    <line x1="698" y1="440" x2="970" y2="440" stroke="#5BBAF0" stroke-width="2.2"/>
    <polygon points="698,435 690,440 698,445" fill="#5BBAF0"/>
    <text x="970" y="431" fill="#5BBAF0" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" text-anchor="end">ready_in</text>

    <!-- clk/rst pegs -->
    <line x1="540" y1="490" x2="540" y2="540" stroke="#A88BFA" stroke-width="2"/>
    <circle cx="540" cy="545" r="4" fill="#A88BFA"/>
    <text x="540" y="568" fill="#A88BFA" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="middle">clk</text>

    <line x1="615" y1="490" x2="615" y2="540" stroke="#F076B0" stroke-width="2"/>
    <circle cx="615" cy="545" r="4" fill="#F076B0"/>
    <text x="615" y="568" fill="#F076B0" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="middle">rst_n</text>

    <rect x="1020" y="220" width="540" height="480" rx="6" fill="#11161D" stroke="#3B4654" stroke-width="1"/>
<circle cx="1036" cy="242" r="3.5" fill="#5BD982"/>
<text x="1048" y="247" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" letter-spacing="2">● CONDITIONS</text>
<text x="1036" y="276" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">HANDSHAKE OUTPUTS  // COMBINATIONAL</text>
<text x="1036" y="294" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1036" fill="#5BBAF0">ready_out</tspan><tspan fill="#D7E1EA"> = </tspan><tspan fill="#D7E1EA">rst_n &amp;&amp; !</tspan><tspan fill="#A88BFA">data_valid</tspan></text>
<text x="1036" y="316" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1036" fill="#5BD982">valid_out</tspan><tspan fill="#D7E1EA"> = </tspan><tspan fill="#A88BFA">data_valid</tspan></text>
<text x="1036" y="338" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1036"> </tspan><tspan fill="#F5B14B">data_out</tspan><tspan fill="#D7E1EA"> = </tspan><tspan fill="#F5B14B">data_reg</tspan></text>
<text x="1036" y="366" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">TRANSFER  // ON POSEDGE CLK</text>
<text x="1036" y="384" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1036" fill="#D7E1EA">accept_in </tspan><tspan fill="#D7E1EA">= </tspan><tspan fill="#5BD982">valid_in</tspan><tspan fill="#D7E1EA"> &amp;&amp; </tspan><tspan fill="#5BBAF0">ready_out</tspan></text>
<text x="1036" y="406" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1036" fill="#D7E1EA">drain     </tspan><tspan fill="#D7E1EA">= </tspan><tspan fill="#A88BFA">data_valid</tspan><tspan fill="#D7E1EA"> &amp;&amp; </tspan><tspan fill="#5BBAF0">ready_in</tspan></text>
<text x="1036" y="434" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">STATE UPDATE</text>
<text x="1036" y="452" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1036" fill="#D7E1EA">if (accept_in)  </tspan><tspan fill="#A88BFA">data_valid</tspan><tspan fill="#D7E1EA"> &lt;= 1</tspan></text>
<text x="1036" y="474" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1036" fill="#D7E1EA">else if (drain) </tspan><tspan fill="#A88BFA">data_valid</tspan><tspan fill="#D7E1EA"> &lt;= 0</tspan></text>
  </svg>