    <text x="60" y="40" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">// PURE XY ROUTING · MESH STYLE · NO WRAP USED</text>
    <text x="60" y="100" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="44" font-weight="700">Pure XY routing</text>
    <text x="60" y="135" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="15">Compare dst_x with my_x using signed inequality. Goes the "right way around" only — wrap links unused.</text><rect x="88" y="208" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
