        <text x="465" y="260" fill="#0A0E13" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" text-anchor="middle">SRC</text>
        <circle cx="135" cy="585" r="18" fill="#F5B14B" opacity="0.9"/>
        <text x="135" y="590" fill="#0A0E13" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" text-anchor="middle">DST</text><line x1="443" y1="255" x2="377" y2="255" stroke="#65D7E5" stroke-width="3"/>
            <polygon points="377,255 387,249 387,261" fill="#65D7E5"/><line x1="333" y1="255" x2="267" y2="255" stroke="#65D7E5" stroke-width="3"/>
            <polygon points="267,255 277,249 277,261" fill="#65D7E5"/><line x1="223" y1="255" x2="157" y2="255" stroke="#65D7E5" stroke-width="3"/>
