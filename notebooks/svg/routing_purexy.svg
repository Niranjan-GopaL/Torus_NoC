            <text x="245" y="259" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(1,0)</text><rect x="308" y="208" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="355" y="259" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(2,0)</text><rect x="418" y="208" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="465" y="259" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(3,0)</text><rect x="88" y="318" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="135" y="369" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(0,1)</text><rect x="198" y="318" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="245" y="369" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(1,1)</text><rect x="308" y="318" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="355" y="369" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(2,1)</text><rect x="418" y="318" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="465" y="369" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(3,1)</text><rect x="88" y="428" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="135" y="479" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(0,2)</text><rect x="198" y="428" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="245" y="479" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(1,2)</text><rect x="308" y="428" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="355" y="479" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(2,2)</text><rect x="418" y="428" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="465" y="479" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(3,2)</text><rect x="88" y="538" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="135" y="589" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(0,3)</text><rect x="198" y="538" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="245" y="589" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(1,3)</text><rect x="308" y="538" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
            <text x="355" y="589" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">(2,3)</text><rect x="418" y="538" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
