            <polygon points="135,563 129,553 141,553" fill="#F076B0"/><rect x="700" y="200" width="760" height="460" rx="6" fill="#11161D" stroke="#3B4654" stroke-width="1"/>
<circle cx="716" cy="222" r="3.5" fill="#5BD982"/>
<text x="728" y="227" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" letter-spacing="2">● PROPERTIES</text>
<text x="716" y="256" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">ALGORITHM</text>
<text x="716" y="274" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">while dst_x ≠ my_x:</tspan></text>
<text x="716" y="296" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">  dst_x &gt; my_x → EAST</tspan></text>
<text x="716" y="318" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">  dst_x &lt; my_x → WEST</tspan></text>
<text x="716" y="340" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">then Y dimension symmetric</tspan></text>
<text x="716" y="368" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">WHAT IT WASTES</text>
<text x="716" y="386" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">Hops (3,0)→(0,3) take </tspan><tspan fill="#F5B14B">6 hops</tspan></text>
<text x="716" y="408" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">Wrap-aware would take </tspan><tspan fill="#5BD982">2 hops</tspan></text>
<text x="716" y="430" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">(East-wrap once, South-wrap once)</tspan></text>
<text x="716" y="458" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">GOOD FOR</text>
<text x="716" y="476" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">Mesh topology (no wrap links)</tspan></text><rect x="60" y="640" width="600" height="140" rx="6" fill="#11161D" stroke="#3B4654" stroke-width="1"/>
        <text x="74" y="660" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1">// pure XY — mesh style</text>
        <text x="74" y="685" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">if      (dst_x &gt; my_x) out_port = E;</text>
        <text x="74" y="703" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">else if (dst_x &lt; my_x) out_port = W;</text>
        <text x="74" y="721" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">else if (dst_y &gt; my_y) out_port = N;</text>
        <text x="74" y="739" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">else if (dst_y &lt; my_y) out_port = S;</text>
        <text x="74" y="757" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">else                   out_port = L;</text></svg>