    <text x="60" y="135" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="15">fdx = (dst_x − my_x) mod 4. Pick the closer side. Distance-2 ties split by coord to kill the ring cycle.</text><rect x="88" y="208" width="94" height="94" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1"/>
