<circle cx="716" cy="222" r="3.5" fill="#5BD982"/>
<text x="728" y="227" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" letter-spacing="2">● HOP TRACE  (1,1) → (3,3)</text>
<text x="716" y="256" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">at (1,1) : fdx=2 tie, my_x&lt;2 → </tspan><tspan fill="#65D7E5">EAST</tspan></text>
<text x="716" y="278" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">at (2,1) : fdx=1            → </tspan><tspan fill="#65D7E5">EAST</tspan></text>
<text x="716" y="300" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">at (3,1) : fdx=0, fdy=2 tie  </tspan></text>
<text x="716" y="322" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">           my_y&lt;2 → </tspan><tspan fill="#F076B0">NORTH</tspan></text>
<text x="716" y="344" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">at (3,2) : fdy=1            → </tspan><tspan fill="#F076B0">NORTH</tspan></text>
<text x="716" y="366" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">at (3,3) : DST              → </tspan><tspan fill="#5BD982">LOCAL</tspan></text>
<text x="716" y="394" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">PROPERTIES</text>
<text x="716" y="412" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">4 hops, all minimal</tspan></text>
<text x="716" y="434" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">Channel-dep graph is acyclic</tspan></text>
<text x="716" y="456" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="716" fill="#D7E1EA">No virtual channels required</tspan></text><rect x="60" y="640" width="600" height="140" rx="6" fill="#11161D" stroke="#3B4654" stroke-width="1"/>
        <text x="74" y="660" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1">// xy_route_logic — torus tie-split</text>
        <text x="74" y="685" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">fdx = (dst_x − my_x) &amp; 2'b11;</text>
        <text x="74" y="703" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">if      (fdx == 1) out_port = E;</text>
        <text x="74" y="721" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">else if (fdx == 3) out_port = W;</text>
        <text x="74" y="739" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12">else if (fdx == 2) out_port = (my_x &lt; 2) ? E : W;  </text>
        <text x="74" y="757" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11">// Y dimension symmetric, runs after X is resolved</text></svg>