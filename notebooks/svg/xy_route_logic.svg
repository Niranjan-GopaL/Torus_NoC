<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820">
    <defs><pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#1F2933"/>
  </pattern></defs>
  <rect width="1600" height="820" fill="#0A0E13"/>
  <rect width="1600" height="820" fill="url(#dots)" opacity="0.5"/>
    <text x="60" y="40" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">// 4x4 TORUS · SHORTEST XY ROUTING · DEADLOCK-FREE</text>
    <text x="60" y="100" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="52" font-weight="700">TORUS ROUTING</text>
    <text x="60" y="138" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="15">Computes the output port from (my_x, my_y, dst_x, dst_y). Forward ring distance</text>
    <text x="60" y="160" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="15">fdx = (dst_x − my_x) mod 4. Distance-2 ties split by coordinate — breaks ring cycle.</text>

    <rect x="60" y="220" width="940" height="530" rx="6" fill="none" stroke="#3B4654" stroke-width="1"/>
    <text x="74" y="242" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2">// DECISION TREE</text>

    <rect x="120" y="280" width="160" height="60" rx="6" fill="#1B2230" stroke="#A88BFA" stroke-width="1.5"/>
    <text x="200" y="318" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">fdx ≠ 0 ?</text>

    <line x1="280" y1="310" x2="380" y2="310" stroke="#5BD982" stroke-width="2"/>
    <text x="320" y="300" fill="#5BD982" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">yes</text>

    <rect x="380" y="280" width="180" height="60" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1.5"/>
    <text x="470" y="318" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">switch fdx</text>

    <line x1="560" y1="310" x2="610" y2="310" stroke="#5C6B7A" stroke-width="1"/>
    <line x1="610" y1="265" x2="610" y2="355" stroke="#5C6B7A" stroke-width="1"/>
    
      <line x1="610" y1="265" x2="650" y2="265" stroke="#5C6B7A" stroke-width="1"/>
      <rect x="650" y="243" width="280" height="44" rx="4" fill="#11161D" stroke="#F5B14B" stroke-width="1.2"/>
      <text x="664" y="261" fill="#F5B14B" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">fdx = 1 → PORT_E</text>
      <text x="664" y="278" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10">+1 hop (wrap if my_x==3)</text>
      <line x1="610" y1="310" x2="650" y2="310" stroke="#5C6B7A" stroke-width="1"/>
      <rect x="650" y="288" width="280" height="44" rx="4" fill="#11161D" stroke="#F5B14B" stroke-width="1.2"/>
      <text x="664" y="306" fill="#F5B14B" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">fdx = 3 → PORT_W</text>
      <text x="664" y="323" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10">−1 hop (wrap if my_x==0)</text>
      <line x1="610" y1="355" x2="650" y2="355" stroke="#5C6B7A" stroke-width="1"/>
      <rect x="650" y="333" width="280" height="44" rx="4" fill="#11161D" stroke="#F076B0" stroke-width="1.2"/>
      <text x="664" y="351" fill="#F076B0" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">fdx = 2 → tie</text>
      <text x="664" y="368" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10">(my_x==2) ? E : W   // breaks cycle</text>

    <line x1="200" y1="340" x2="200" y2="420" stroke="#5C6B7A" stroke-width="2"/>
    <polygon points="195,415 200,425 205,415" fill="#5C6B7A"/>
    <text x="215" y="385" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11">no → Y dimension</text>

    <rect x="120" y="440" width="160" height="60" rx="6" fill="#1B2230" stroke="#A88BFA" stroke-width="1.5"/>
    <text x="200" y="478" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">fdy ≠ 0 ?</text>

    <line x1="280" y1="470" x2="380" y2="470" stroke="#5BD982" stroke-width="2"/>
    <rect x="380" y="440" width="180" height="60" rx="6" fill="#1B2230" stroke="#3B4654" stroke-width="1.5"/>
    <text x="470" y="478" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">switch fdy</text>

    <line x1="560" y1="470" x2="610" y2="470" stroke="#5C6B7A" stroke-width="1"/>
    <line x1="610" y1="425" x2="610" y2="515" stroke="#5C6B7A" stroke-width="1"/>
    
      <line x1="610" y1="425" x2="650" y2="425" stroke="#5C6B7A" stroke-width="1"/>
      <rect x="650" y="403" width="280" height="44" rx="4" fill="#11161D" stroke="#F5B14B" stroke-width="1.2"/>
      <text x="664" y="421" fill="#F5B14B" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">fdy = 1 → PORT_N</text>
      <text x="664" y="438" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10">+1 hop (wrap if my_y==3)</text>
      <line x1="610" y1="470" x2="650" y2="470" stroke="#5C6B7A" stroke-width="1"/>
      <rect x="650" y="448" width="280" height="44" rx="4" fill="#11161D" stroke="#F5B14B" stroke-width="1.2"/>
      <text x="664" y="466" fill="#F5B14B" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">fdy = 3 → PORT_S</text>
      <text x="664" y="483" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10">−1 hop (wrap if my_y==0)</text>
      <line x1="610" y1="515" x2="650" y2="515" stroke="#5C6B7A" stroke-width="1"/>
      <rect x="650" y="493" width="280" height="44" rx="4" fill="#11161D" stroke="#F076B0" stroke-width="1.2"/>
      <text x="664" y="511" fill="#F076B0" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">fdy = 2 → tie</text>
      <text x="664" y="528" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10">(my_y==2) ? N : S</text>

    <line x1="200" y1="500" x2="200" y2="600" stroke="#5C6B7A" stroke-width="2"/>
    <polygon points="195,595 200,605 205,595" fill="#5C6B7A"/>
    <rect x="120" y="610" width="160" height="50" rx="6" fill="#1B2230" stroke="#65D7E5" stroke-width="1.5"/>
    <text x="200" y="643" fill="#65D7E5" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">PORT_L</text>
    <text x="295" y="643" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="11">eject (arrived at destination)</text>

    <rect x="1040" y="220" width="520" height="530" rx="6" fill="#11161D" stroke="#3B4654" stroke-width="1"/>
<circle cx="1056" cy="242" r="3.5" fill="#5BD982"/>
<text x="1068" y="247" fill="#D7E1EA" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" letter-spacing="2">● DEADLOCK PROOF</text>
<text x="1056" y="276" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">WHY THE TIE-SPLIT IS SAFE</text>
<text x="1056" y="294" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1056" fill="#D7E1EA">Without it: distance-2 traffic</tspan></text>
<text x="1056" y="316" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1056" fill="#D7E1EA">always rotates one direction →</tspan></text>
<text x="1056" y="338" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1056" fill="#D7E1EA">full East-ring channel cycle</tspan></text>
<text x="1056" y="360" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1056" fill="#D7E1EA">(c0→c1→c2→c3→c0). Deadlock.</tspan></text>
<text x="1056" y="388" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1056" fill="#D7E1EA">With it: low half goes East,</tspan></text>
<text x="1056" y="410" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1056" fill="#D7E1EA">high half goes West for the</tspan></text>
<text x="1056" y="432" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1056" fill="#D7E1EA">distance-2 case. Each ring</tspan></text>
<text x="1056" y="454" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1056" fill="#D7E1EA">CDG becomes linear, acyclic.</tspan></text>
<text x="1056" y="482" fill="#5C6B7A" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">PORT ENCODING</text>
<text x="1056" y="500" font-family="JetBrains Mono, monospace" font-size="13"><tspan x="1056" fill="#D7E1EA">N=0  S=1  E=2  W=3  L=4</tspan></text>
  </svg>